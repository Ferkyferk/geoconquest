<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="g" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#F0C040"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </radialGradient>
    <clipPath id="globe">
      <circle cx="16" cy="16" r="14"/>
    </clipPath>
  </defs>
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="15.5" fill="#1a1510" stroke="#D4AF37" stroke-width="1"/>
  <!-- Globe body -->
  <circle cx="16" cy="16" r="14" fill="url(#g)" opacity="0.15"/>
  <!-- Meridians and parallels -->
  <g clip-path="url(#globe)" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.7">
    <!-- Equator -->
    <line x1="2" y1="16" x2="30" y2="16"/>
    <!-- Tropics -->
    <ellipse cx="16" cy="10" rx="13" ry="0"/>
    <line x1="3" y1="10" x2="29" y2="10"/>
    <line x1="3" y1="22" x2="29" y2="22"/>
    <!-- Central meridian -->
    <ellipse cx="16" cy="16" rx="0" ry="14"/>
    <line x1="16" y1="2" x2="16" y2="30"/>
    <!-- Curved meridians -->
    <ellipse cx="16" cy="16" rx="5" ry="14"/>
    <ellipse cx="16" cy="16" rx="10" ry="14"/>
  </g>
  <!-- Simplified continent shapes -->
  <g clip-path="url(#globe)" fill="#D4AF37" opacity="0.5">
    <!-- North America -->
    <path d="M7,6 L10,5 L12,7 L13,10 L11,13 L9,14 L7,12 L6,9Z"/>
    <!-- South America -->
    <path d="M10,17 L12,16 L13,18 L13,22 L11,25 L9,24 L9,20Z"/>
    <!-- Europe/Africa -->
    <path d="M16,7 L18,6 L19,8 L18,10 L17,9Z"/>
    <path d="M16,13 L18,12 L19,15 L19,20 L17,22 L16,19Z"/>
    <!-- Asia -->
    <path d="M20,5 L25,6 L27,9 L26,12 L23,13 L20,11 L19,8Z"/>
    <!-- Australia -->
    <path d="M24,19 L27,18 L28,20 L26,22 L24,21Z"/>
  </g>
  <!-- Globe highlight -->
  <circle cx="11" cy="10" r="6" fill="white" opacity="0.06"/>
</svg>
